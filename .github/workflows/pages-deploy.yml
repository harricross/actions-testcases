name: pages-deploy

# Exercises GitHub Pages deploy via the official actions. Gated on
# vars.ENABLE_PAGES — Pages must also be enabled in repo Settings.

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      enabled: ${{ steps.g.outputs.enabled }}
    steps:
      - id: g
        run: |
          set -euo pipefail
          if [ "${{ vars.ENABLE_PAGES }}" != "true" ]; then
            echo "SKIP: vars.ENABLE_PAGES is not 'true'" >> "$GITHUB_STEP_SUMMARY"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build site
        run: |
          set -euo pipefail
          mkdir -p _site
          ts=$(date -u +%FT%TZ)
          cat > _site/index.html <<HTML
          <!doctype html>
          <html><body>
            <h1>actions-testcases</h1>
            <p>Pages deploy probe at ${ts}</p>
            <p>commit: ${GITHUB_SHA}</p>
          </body></html>
          HTML
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.dep.outputs.page_url }}
    steps:
      - id: dep
        uses: actions/deploy-pages@v4
      - run: |
          set -euo pipefail
          echo "PASS: Pages deployed to ${{ steps.dep.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
