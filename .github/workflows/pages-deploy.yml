name: pages-deploy

# The deploy side of GitHub Pages is now exercised every hour by
# `_aggregate.yml`, which publishes the live dashboard. This workflow
# probes the *consumer* side: it asserts the published Pages URL is
# reachable and serves the dashboard. Skips on first run before a
# dashboard exists.

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: read

defaults:
  run:
    shell: bash

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Resolve Pages URL
        id: u
        run: |
          set -euo pipefail
          url=$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.html_url' 2>/dev/null || true)
          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "SKIP: Pages not configured for this repository" >> "$GITHUB_STEP_SUMMARY"
            echo "url=" >> "$GITHUB_OUTPUT"
          else
            echo "url=$url" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch and assert dashboard
        if: steps.u.outputs.url != ''
        run: |
          set -euo pipefail
          url="${{ steps.u.outputs.url }}"
          # Cache-bust to avoid stale CDN copies hiding deploy regressions.
          probe="${url}?probe=$(date -u +%s)"
          body=$(curl -fsSL --max-time 30 "$probe")
          # The dashboard always contains this title and a link to metrics.json.
          echo "$body" | grep -q "actions-testcases — live status" \
            || { echo "FAIL: dashboard body missing expected title"; exit 1; }
          echo "$body" | grep -q "metrics.json" \
            || { echo "FAIL: dashboard body missing metrics.json link"; exit 1; }
          # Also fetch the data file directly.
          curl -fsSL --max-time 30 "${url%/}/metrics.json" >/dev/null \
            || { echo "FAIL: metrics.json not served"; exit 1; }
          echo "PASS: Pages serves the live dashboard at ${url}" >> "$GITHUB_STEP_SUMMARY"
