name: _self-test

# Static contract tests for the suite definitions themselves.
#
# Every suite asserts behaviour at runtime, but a "fix" that silently
# removes the assertion would still go green. This workflow is the
# meta-guard: it inspects each suite file and asserts the things that
# must be true by construction —
#
#   1. No third-party action use (first-party-only invariant from AGENTS.md).
#   2. Every workflow declares timeout-minutes on every job.
#   3. Every suite is wired into _scheduler.yml (or is intentionally
#      exempt — _scheduler, _aggregate, reusable callees, push-triggered
#      probes).
#   4. Each suite still contains the feature tokens that prove it
#      tests what it claims to test (e.g. cache.yml must reference
#      actions/cache@, with both save and restore keys).
#
# Runs on every push that touches workflows or shared scripts, plus
# manual dispatch. Does not run on the hourly schedule — this is a
# pre-merge guard, not part of the suite roster.

on:
  push:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'tests/**'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: self-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run contract tests
        run: |
          set -euo pipefail
          fail=0
          pass=0
          # tally <test-name> <pass|fail> <message>
          tally() {
            if [ "$2" = "pass" ]; then
              pass=$((pass+1))
              echo "✅ $1"
            else
              fail=$((fail+1))
              echo "❌ $1 — $3"
            fi
          }

          echo "## Suite contract tests" >> "$GITHUB_STEP_SUMMARY"

          # ---------------------------------------------------------------
          # Test 1: First-party-only. Every `uses:` line must reference
          # a local workflow (./), an actions/* repo, or a github/* repo.
          # ---------------------------------------------------------------
          bad=$(grep -rhnE '^[[:space:]]*-?[[:space:]]*uses:' .github/workflows/ \
            | grep -vE 'uses:[[:space:]]*(\./|actions/|github/)' || true)
          if [ -z "$bad" ]; then
            tally "first-party-only invariant" pass
          else
            tally "first-party-only invariant" fail "found non-first-party uses: $bad"
          fi

          # ---------------------------------------------------------------
          # Test 2: Every job in every workflow declares timeout-minutes.
          # We approximate by counting "jobs:" blocks vs timeout-minutes
          # occurrences per file, but the cleaner check is per-file: at
          # least one timeout-minutes per file. Stricter check would parse
          # YAML, but bash + grep is the rule (see AGENTS.md).
          # ---------------------------------------------------------------
          missing=()
          for f in .github/workflows/*.yml; do
            if ! grep -q "timeout-minutes:" "$f"; then
              missing+=("$(basename "$f")")
            fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            tally "timeout-minutes set on every workflow" pass
          else
            tally "timeout-minutes set on every workflow" fail "missing: ${missing[*]}"
          fi

          # ---------------------------------------------------------------
          # Test 3: Suite roster wired into _scheduler.yml. Every
          # workflow file is either:
          #   - referenced by `uses: ./.github/workflows/<file>` in
          #     _scheduler.yml (the canonical orchestration entry point), or
          #   - listed in the EXEMPT set below (orchestration, callees,
          #     trigger probes that fire on their own events).
          # ---------------------------------------------------------------
          exempt=(
            _scheduler.yml _aggregate.yml _self-test.yml
            _issue-lifecycle-test.yml
            reusable-caller.yml triggers-workflow-call.yml
            triggers-push.yml triggers-workflow-run.yml triggers-manual.yml
            triggers-events.yml
          )
          missing_from_scheduler=()
          for f in .github/workflows/*.yml; do
            base=$(basename "$f")
            skip=0
            for e in "${exempt[@]}"; do [ "$base" = "$e" ] && skip=1 && break; done
            [ "$skip" = "1" ] && continue
            if ! grep -q "uses: \\./\\.github/workflows/$base" .github/workflows/_scheduler.yml; then
              missing_from_scheduler+=("$base")
            fi
          done
          if [ ${#missing_from_scheduler[@]} -eq 0 ]; then
            tally "every suite wired into _scheduler.yml" pass
          else
            tally "every suite wired into _scheduler.yml" fail \
              "orphan suites: ${missing_from_scheduler[*]}"
          fi

          # ---------------------------------------------------------------
          # Test 4: Per-suite feature-token contracts. The string in the
          # second column MUST appear in the suite file. This is the line
          # of defence against "fixes" that delete the assertion logic
          # while leaving the workflow nominally green.
          #
          # Format: <suite-file>|<required-substring>|<purpose>
          # Multiple rows per suite are AND-ed.
          # ---------------------------------------------------------------
          contracts=$(cat <<'EOF'
          cache.yml|actions/cache@|cache action used
          cache.yml|restore-keys|restore-keys fallback exercised
          artifacts.yml|actions/upload-artifact@|upload exercised
          artifacts.yml|actions/download-artifact@|download exercised
          artifacts.yml|merge-multiple|pattern + merge tested
          artifacts-attestations.yml|actions/attest|attestation produced
          matrix-strategies.yml|matrix:|matrix used
          matrix-strategies.yml|include:|matrix include exercised
          matrix-strategies.yml|fail-fast|fail-fast exercised
          matrix-strategies.yml|max-parallel|max-parallel exercised
          oidc-cloud.yml|id-token: write|OIDC permission requested
          oidc-cloud.yml|ACTIONS_ID_TOKEN_REQUEST_URL|OIDC token endpoint exercised
          composite-action-test.yml|./.github/actions/composite-smoke|local composite action invoked
          docker-action-test.yml|./.github/actions/docker-smoke|local docker action invoked
          javascript-action-test.yml|./.github/actions/javascript-smoke|local JS action invoked
          environments-approval.yml|environment:|environment binding tested
          secrets-and-vars.yml|secrets.|secret read tested
          secrets-and-vars.yml|vars.|var read tested
          permissions-token.yml|permissions:|permissions block tested
          permissions-token.yml|GITHUB_TOKEN|token use exercised
          concurrency.yml|concurrency:|concurrency block tested
          concurrency.yml|cancel-in-progress|cancel semantic tested
          expressions-contexts.yml|github.actor|github context exercised
          expressions-contexts.yml|runner.os|runner context exercised
          expressions-contexts.yml|steps.|steps context exercised
          workflow-commands.yml|::notice|notice command tested
          workflow-commands.yml|::warning|warning command tested
          workflow-commands.yml|::error|error command tested
          step-summary-annotations.yml|GITHUB_STEP_SUMMARY|step summary tested
          runners-os-matrix.yml|windows-latest|windows runner exercised
          runners-os-matrix.yml|macos-latest|macos runner exercised
          runners-os-matrix.yml|ubuntu-latest|ubuntu runner exercised
          runners-container.yml|container:|container job tested
          job-orchestration.yml|needs:|job dependency tested
          dependency-graph.yml|dependency-graph/snapshots|SBOM submission API used
          reusable-caller.yml|uses: ./.github/workflows/|reusable workflow called
          triggers-events.yml|repository_dispatch:|repository_dispatch trigger declared
          triggers-events.yml|issues:|issues trigger declared
          triggers-workflow-run.yml|workflow_run:|workflow_run trigger declared
          pages-deploy.yml|pages: read|pages probe permission set
          EOF
          )
          contract_fail=0
          contract_total=0
          while IFS='|' read -r suite token purpose; do
            suite=$(echo "$suite" | xargs)
            token=$(echo "$token" | xargs)
            purpose=$(echo "$purpose" | xargs)
            [ -z "$suite" ] && continue
            contract_total=$((contract_total+1))
            f=".github/workflows/$suite"
            if [ ! -f "$f" ]; then
              contract_fail=$((contract_fail+1))
              echo "❌ contract: $suite — file missing"
              continue
            fi
            if grep -qF "$token" "$f"; then
              echo "  · $suite ⊃ '$token' ($purpose)"
            else
              contract_fail=$((contract_fail+1))
              echo "❌ contract: $suite missing '$token' ($purpose)"
            fi
          done <<< "$contracts"
          if [ "$contract_fail" -eq 0 ]; then
            tally "per-suite feature-token contracts ($contract_total checks)" pass
          else
            tally "per-suite feature-token contracts" fail \
              "$contract_fail / $contract_total contracts violated"
          fi

          # ---------------------------------------------------------------
          # Test 4b: Local action.yml contracts. The composite/docker/JS
          # action suites delegate to local actions under
          # .github/actions/<name>/action.yml — those are where `using:`
          # actually lives. If the action.yml is gutted, the suite would
          # silently lose what it's claiming to test.
          # ---------------------------------------------------------------
          action_contracts=$(cat <<'EOF'
          .github/actions/composite-smoke/action.yml|using: composite|composite action declared
          .github/actions/composite-smoke/action.yml|outputs:|composite outputs exercised
          .github/actions/docker-smoke/action.yml|using: docker|docker action declared
          .github/actions/docker-smoke/action.yml|image:|docker image declared
          .github/actions/javascript-smoke/action.yml|using: node|node JS action declared
          .github/actions/javascript-smoke/action.yml|main:|JS entry-point declared
          EOF
          )
          ac_fail=0; ac_total=0
          while IFS='|' read -r f token purpose; do
            f=$(echo "$f" | xargs); token=$(echo "$token" | xargs); purpose=$(echo "$purpose" | xargs)
            [ -z "$f" ] && continue
            ac_total=$((ac_total+1))
            if [ ! -f "$f" ]; then
              ac_fail=$((ac_fail+1)); echo "❌ action: $f missing"; continue
            fi
            if grep -qF "$token" "$f"; then
              echo "  · $f ⊃ '$token' ($purpose)"
            else
              ac_fail=$((ac_fail+1)); echo "❌ action: $f missing '$token' ($purpose)"
            fi
          done <<< "$action_contracts"
          if [ "$ac_fail" -eq 0 ]; then
            tally "local action.yml contracts ($ac_total checks)" pass
          else
            tally "local action.yml contracts" fail \
              "$ac_fail / $ac_total contracts violated"
          fi

          # ---------------------------------------------------------------
          # Test 5: Aggregator metrics jq is syntactically valid jq.
          # We don't assert output here (the regression test below does),
          # but a syntax error must fail the build, not wait for the next
          # aggregator run. Use a real fixture so we exercise the actual
          # parse paths.
          # ---------------------------------------------------------------
          if jq -s --arg now "2026-01-01T05:00:00Z" -f .github/scripts/metrics.jq \
               tests/fixtures/snapshots/01.json >/tmp/metrics-syntax.json 2>/tmp/metrics-syntax.err; then
            tally "metrics.jq runs cleanly on a real snapshot" pass
          else
            tally "metrics.jq runs cleanly on a real snapshot" fail \
              "$(cat /tmp/metrics-syntax.err)"
          fi
          if jq -r -f .github/scripts/highlights.jq /tmp/metrics-syntax.json \
               >/tmp/highlights-syntax.md 2>/tmp/highlights-syntax.err; then
            tally "highlights.jq runs cleanly on metrics output" pass
          else
            tally "highlights.jq runs cleanly on metrics output" fail \
              "$(cat /tmp/highlights-syntax.err)"
          fi

          echo ""
          echo "── Summary ────────────────────────────────────"
          echo "passed: $pass"
          echo "failed: $fail"
          {
            echo ""
            echo "**$pass passed, $fail failed**"
          } >> "$GITHUB_STEP_SUMMARY"
          [ "$fail" -eq 0 ]

      - name: Run metrics.jq regression test against fixtures
        run: bash tests/run-metrics-tests.sh
