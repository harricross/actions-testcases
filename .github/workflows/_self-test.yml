name: _self-test

# Static contract tests for the suite definitions themselves.
#
# Every suite asserts behaviour at runtime, but a "fix" that silently
# removes the assertion would still go green. This workflow is the
# meta-guard: it inspects each suite file and asserts the things that
# must be true by construction —
#
#   1. No third-party action use (first-party-only invariant from AGENTS.md).
#   2. Every workflow declares timeout-minutes on every job.
#   3. Every suite is wired into _scheduler.yml (or is intentionally
#      exempt — _scheduler, _aggregate, reusable callees, push-triggered
#      probes).
#   4. Each suite still contains the feature tokens that prove it
#      tests what it claims to test (e.g. cache.yml must reference
#      actions/cache@, with both save and restore keys).
#
# Runs on every push that touches workflows or shared scripts, plus
# manual dispatch. Does not run on the hourly schedule — this is a
# pre-merge guard, not part of the suite roster.

on:
  push:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'tests/**'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: self-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run contract tests
        run: bash .github/scripts/check-contracts.sh

      - name: Run metrics.jq regression test against fixtures
        run: bash tests/run-metrics-tests.sh

      - name: Run negative-test harness (proves the checkers actually catch breakage)
        run: bash tests/run-negative-tests.sh
