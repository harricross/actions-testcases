name: secrets-and-vars

# Exercises secret/variable surfaces and masking.
#   - Confirms GITHUB_TOKEN is present and masked.
#   - Confirms vars.* expressions evaluate (presence/absence both ok).
#   - Confirms a secret value never appears in logs (echo prints ***).

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  surfaces:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: GITHUB_TOKEN present
        env:
          T: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${T:-}" ] || { echo "FAIL: GITHUB_TOKEN empty"; exit 1; }
          echo "PASS: GITHUB_TOKEN present (length=${#T})" >> "$GITHUB_STEP_SUMMARY"

      - name: Mask a probe secret and prove it is masked
        run: |
          set -euo pipefail
          probe="suite-probe-$(date -u +%s)-$RANDOM"
          echo "::add-mask::$probe"
          echo "the secret was: $probe"
          echo "PASS: emitted masked secret (check logs show ***)" >> "$GITHUB_STEP_SUMMARY"

      - name: Enumerate vars
        run: |
          set -euo pipefail
          {
            echo "## vars observed"
            echo "- SELF_HOSTED_LABEL=${{ vars.SELF_HOSTED_LABEL }}"
            echo "- ARC_RUNNER_LABEL=${{ vars.ARC_RUNNER_LABEL }}"
            echo "- LARGER_RUNNER_LABEL=${{ vars.LARGER_RUNNER_LABEL }}"
            echo "- APPROVAL_ENVIRONMENT=${{ vars.APPROVAL_ENVIRONMENT }}"
            echo "- ENABLE_PAGES=${{ vars.ENABLE_PAGES }}"
            echo "- ENABLE_ATTESTATIONS=${{ vars.ENABLE_ATTESTATIONS }}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "PASS: vars context evaluated (any value, including empty, is ok)" >> "$GITHUB_STEP_SUMMARY"
