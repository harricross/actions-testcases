name: docker-action-test

# Invokes the local Dockerfile action under .github/actions/docker-smoke.
# Linux-only by hosted-runner platform constraint.

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - id: smoke
        uses: ./.github/actions/docker-smoke
        with:
          who: actions-testcases
      - name: Assert docker action output
        env:
          GREETING: ${{ steps.smoke.outputs.greeting }}
        run: |
          set -euo pipefail
          [ -n "$GREETING" ] || { echo "FAIL: docker action produced no output"; exit 1; }
          echo "$GREETING" | grep -q "actions-testcases" || { echo "FAIL: unexpected greeting: $GREETING"; exit 1; }
          echo "PASS: docker action ok -> $GREETING" >> "$GITHUB_STEP_SUMMARY"
