name: runners-container

# Exercises `container:` job + service containers. Linux-only on hosted
# runners by platform constraint.

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  container_with_services:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: alpine:3.20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: probe
          POSTGRES_DB: probe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Install probe tools
        # alpine has no bash; install it first using sh, then later steps
        # can use the workflow-default bash shell.
        shell: sh
        run: |
          set -eu
          apk add --no-cache bash postgresql-client redis curl >/dev/null
      - uses: actions/checkout@v4
      - name: Probe postgres service
        env:
          PGPASSWORD: probe
        run: |
          set -euo pipefail
          # Service containers resolve by their key inside the job container.
          psql -h postgres -U postgres -d probe -c 'select 1' | grep -q '1 row'
          echo "PASS: postgres service reachable as host=postgres" >> "$GITHUB_STEP_SUMMARY"
      - name: Probe redis service
        run: |
          set -euo pipefail
          out="$(redis-cli -h redis ping)"
          [ "$out" = "PONG" ] || { echo "FAIL: redis ping returned $out"; exit 1; }
          echo "PASS: redis service reachable as host=redis" >> "$GITHUB_STEP_SUMMARY"
      - name: Confirm we ran inside the container image
        run: |
          set -euo pipefail
          grep -q 'Alpine' /etc/os-release || { echo "FAIL: not in alpine container"; exit 1; }
          echo "PASS: job ran inside alpine:3.20 container" >> "$GITHUB_STEP_SUMMARY"
