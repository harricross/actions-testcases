name: javascript-action-test

# Invokes the local JS action under .github/actions/javascript-smoke on
# every OS to prove Node 20 actions are healthy cross-platform.

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  invoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - id: smoke
        uses: ./.github/actions/javascript-smoke
        with:
          payload: hello-${{ runner.os }}
      - name: Assert reversed output
        env:
          REV: ${{ steps.smoke.outputs.reversed }}
        run: |
          set -euo pipefail
          expected_in="hello-${{ runner.os }}"
          # Reverse expected_in in shell to compare.
          rev=$(printf '%s' "$expected_in" | rev)
          [ "$REV" = "$rev" ] || { echo "FAIL: reversed=$REV expected=$rev"; exit 1; }
          echo "PASS: js action reversed correctly on ${{ runner.os }} -> $REV" >> "$GITHUB_STEP_SUMMARY"
