name: _aggregate

# Reporting model C:
#
#   1. Triggered when _scheduler.yml completes. Reads the latest
#      conclusion of every test workflow.
#   2. Commits the snapshot to a dedicated `status` orphan branch as
#      `status/YYYY/MM/DD/HH.json` and a rendered `status/YYYY/MM/DD/HH.md`.
#      Updates daily and monthly rollup markdown for the same day/month.
#   3. For each suite that is currently failing, opens (or comments on)
#      a per-suite issue `actions-suite: failing — <suite>`. When that
#      suite goes back to green on a subsequent run, the issue is auto-
#      closed with a recovery comment.
#
# The `status` orphan branch keeps `main` clean — none of these commits
# trigger triggers-push.yml because that workflow only listens to push on
# `suite-probe/**`.
#
# See AGENTS.md for the full architecture.

on:
  workflow_run:
    workflows: [_scheduler]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

concurrency:
  group: aggregate
  cancel-in-progress: false

env:
  STATUS_BRANCH: status

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # gh CLI infers the repo from .git; without a working tree it errors.
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ------------------------------------------------------------------
      # 1. Snapshot every test workflow's latest conclusion as JSON.
      # ------------------------------------------------------------------
      - name: Build snapshot
        id: snap
        run: |
          set -euo pipefail
          mapfile -t entries <<'EOF'
          _scheduler.yml|Scheduler (top-level)
          triggers-push.yml|triggers — push / PR
          triggers-events.yml|triggers — issues / events
          triggers-manual.yml|triggers — workflow_dispatch
          triggers-workflow-call.yml|triggers — workflow_call
          reusable-caller.yml|reusable workflow caller
          triggers-workflow-run.yml|triggers — workflow_run
          runners-os-matrix.yml|runners — ubuntu/win/mac
          runners-self-hosted.yml|runners — self-hosted
          runners-arc.yml|runners — Actions Runner Controller
          runners-larger.yml|runners — larger hosted
          runners-container.yml|runners — container + services
          matrix-strategies.yml|matrix strategies
          expressions-contexts.yml|expressions / contexts
          job-orchestration.yml|job orchestration
          concurrency.yml|concurrency
          permissions-token.yml|permissions / GITHUB_TOKEN
          secrets-and-vars.yml|secrets / vars / masking
          environments-approval.yml|environments / approvals
          oidc-cloud.yml|OIDC token issuance
          artifacts.yml|artifacts (v4)
          cache.yml|cache
          workflow-commands.yml|workflow commands
          step-summary-annotations.yml|step summary / annotations
          composite-action-test.yml|composite action
          docker-action-test.yml|docker action
          javascript-action-test.yml|javascript action
          artifacts-attestations.yml|build provenance attestations
          dependency-graph.yml|dependency submission
          pages-deploy.yml|pages deploy
          EOF

          ts_iso="$(date -u +%FT%TZ)"
          year="$(date -u +%Y)"
          month="$(date -u +%m)"
          day="$(date -u +%d)"
          hour="$(date -u +%H)"

          tmp="$(mktemp)"
          : > "$tmp"
          for entry in "${entries[@]}"; do
            wf="${entry%%|*}"
            label="${entry##*|}"
            row="$(gh run list --workflow "$wf" --limit 1 \
              --json databaseId,conclusion,status,htmlUrl,createdAt \
              --jq '.[0] | [(.databaseId|tostring), .conclusion, .status, .htmlUrl, .createdAt] | @tsv' \
              2>/dev/null || true)"
            if [ -z "$row" ]; then
              row=$'0\tmissing\tmissing\t\t'
            fi
            printf '%s\t%s\t%s\n' "$wf" "$label" "$row" >> "$tmp"
          done

          jq -Rn \
            --arg ts "$ts_iso" \
            --arg run "$GITHUB_RUN_ID" \
            --arg url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --rawfile rows "$tmp" '
            {
              generated_at: $ts,
              aggregator_run: $run,
              aggregator_url: $url,
              suites: ($rows | rtrimstr("\n") | split("\n") | map(
                split("\t") |
                {
                  workflow:   .[0],
                  label:      .[1],
                  run_id:     ((.[2] // "0") | tonumber? // 0),
                  conclusion: (.[3] // ""),
                  status:     (.[4] // ""),
                  url:        (.[5] // ""),
                  created_at: (.[6] // "")
                }
              ))
            }' > snapshot.json

          {
            echo "# Suite snapshot — ${ts_iso}"
            echo ""
            echo "Aggregator run: [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo ""
            echo "| Suite | Conclusion | Run |"
            echo "|---|---|---|"
            jq -r '.suites[] |
              ([.conclusion, .status] | map(select(length>0)) | (.[0] // "never run")) as $disp |
              (if   $disp == "success"   then "✅"
               elif $disp == "failure"   then "❌"
               elif $disp == "cancelled" then "🟡"
               elif $disp == "skipped"   then "⚪"
               elif $disp == "missing"   then "⚪"
               elif $disp == "never run" then "⚪"
               else "🔵" end) as $icon |
              "| \(.label) | \($icon) \($disp) | " +
              (if (.url|length)>0 then "[run](\(.url))" else "—" end) + " |"
            ' snapshot.json
            echo ""
            echo "Legend: ✅ success · ❌ failure · 🟡 cancelled · 🔵 in-progress · ⚪ skipped or never run"
          } > snapshot.md

          jq -r '.suites[]
            | select(.workflow != "_scheduler.yml")
            | select(.conclusion == "failure")
            | "\(.workflow)\t\(.label)\t\(.url)"' snapshot.json > failing.tsv

          {
            echo "year=$year"
            echo "month=$month"
            echo "day=$day"
            echo "hour=$hour"
            echo "ts=$ts_iso"
            echo "fail_count=$(wc -l < failing.tsv | tr -d ' ')"
          } >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # 2. Commit snapshot + rollups to the `status` orphan branch.
      # ------------------------------------------------------------------
      - name: Check out (or create) status branch
        run: |
          set -euo pipefail
          git config --global user.name  "actions-testcases[bot]"
          git config --global user.email "actions-testcases@users.noreply.github.com"
          mkdir status-branch
          cd status-branch
          git init -q -b "$STATUS_BRANCH"
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          # Token-based auth via x-access-token.
          auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git config "http.${GITHUB_SERVER_URL}/.extraheader" "$auth_header"
          if git fetch --depth 1 origin "$STATUS_BRANCH" 2>/dev/null; then
            git checkout -q -B "$STATUS_BRANCH" FETCH_HEAD
          else
            cat > README.md <<'MD'
          # status branch

          Auto-generated by `.github/workflows/_aggregate.yml`. Each entry
          under `status/YYYY/MM/DD/HH.{json,md}` is one snapshot of the
          actions-testcases suite. Daily and monthly rollups live one
          level up.

          Do not edit by hand.
          MD
            git add README.md
            git commit -q -m "init status branch"
          fi

      - name: Write snapshot + rollups
        env:
          Y: ${{ steps.snap.outputs.year }}
          M: ${{ steps.snap.outputs.month }}
          D: ${{ steps.snap.outputs.day }}
          H: ${{ steps.snap.outputs.hour }}
          TS: ${{ steps.snap.outputs.ts }}
        run: |
          set -euo pipefail
          cd status-branch
          dest="status/${Y}/${M}/${D}"
          mkdir -p "$dest"
          cp ../snapshot.json "${dest}/${H}.json"
          cp ../snapshot.md   "${dest}/${H}.md"

          # ----- Daily rollup -----
          daily="status/${Y}/${M}/${D}.md"
          {
            echo "# Day ${Y}-${M}-${D}"
            echo ""
            echo "| Hour | Failures | Snapshot |"
            echo "|---|---|---|"
            for f in $(ls "${dest}"/*.json 2>/dev/null | sort); do
              h="$(basename "$f" .json)"
              fails=$(jq '[.suites[] | select(.workflow != "_scheduler.yml") | select(.conclusion=="failure")] | length' "$f")
              icon="✅"
              [ "$fails" -gt 0 ] && icon="❌"
              echo "| ${h}:00 | ${icon} ${fails} | [md](./${D}/${h}.md) · [json](./${D}/${h}.json) |"
            done
          } > "$daily"

          # ----- Monthly rollup -----
          monthly="status/${Y}/${M}.md"
          {
            echo "# Month ${Y}-${M}"
            echo ""
            echo "| Day | Failing snapshots / total | Detail |"
            echo "|---|---|---|"
            for ddir in $(ls -d "status/${Y}/${M}"/*/ 2>/dev/null | sort); do
              dd="$(basename "$ddir")"
              total=$(ls "${ddir}"/*.json 2>/dev/null | wc -l | tr -d ' ')
              fails=0
              for f in "${ddir}"*.json; do
                [ -f "$f" ] || continue
                n=$(jq '[.suites[] | select(.workflow != "_scheduler.yml") | select(.conclusion=="failure")] | length' "$f")
                [ "$n" -gt 0 ] && fails=$(( fails + 1 ))
              done
              echo "| ${dd} | ${fails}/${total} | [day](./${M}/${dd}.md) |"
            done
          } > "$monthly"

      # ------------------------------------------------------------------
      # 2b. Compute deterministic metrics + highlights from history.
      # ------------------------------------------------------------------
      - name: Compute metrics
        id: metrics
        env:
          TS: ${{ steps.snap.outputs.ts }}
        run: |
          set -euo pipefail
          cd status-branch

          # Slurp every snapshot we've ever written (small files, ~720/month).
          # Build a per-suite history sorted by timestamp, then derive uptime,
          # streaks, flake counts, MTTR, and per-window stats.
          shopt -s globstar nullglob
          files=( status/**/*.json )
          # Filter to hourly snapshots only (HH.json), excluding the rollup
          # files we may add later. The path always ends /YYYY/MM/DD/HH.json.
          hourly=()
          for f in "${files[@]}"; do
            base="$(basename "$f" .json)"
            case "$base" in [0-9][0-9]) hourly+=("$f");; esac
          done

          if [ "${#hourly[@]}" -eq 0 ]; then
            echo '{"generated_at":"'"$TS"'","suites":[],"highlights":{"new_failures":[],"recoveries":[],"long_red":[],"flakiest":[],"low_uptime":[]}}' > ../metrics.json
          else
            jq -s --arg now "$TS" '
              # parse_ts converts ISO 8601 to epoch seconds.
              def parse_ts(s): s | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601;
              def now_epoch: $now | parse_ts(.);
              def uptime(arr): (arr | length) as $n
                | if $n == 0 then null
                  else ((arr | map(select(.conclusion=="success")) | length) * 1000 / $n | floor / 10)
                  end;
              # Flake count = success<->failure transitions in window.
              def flakes(arr):
                if (arr | length) < 2 then 0
                else [range(1; arr|length) | select(arr[.].conclusion != arr[.-1].conclusion)] | length
                end;

              ([ .[] as $snap | $snap.suites[] | select(.workflow != "_scheduler.yml")
                 | { workflow, label, conclusion, url, ts: $snap.generated_at } ]
              | group_by(.workflow)
              | map(
                  sort_by(.ts) as $h
                  | ($h[-1].label) as $label
                  | ($h[-1]) as $latest
                  | ($h[-2] // null) as $prev
                  | ($h | map(select(.conclusion == "success" or .conclusion == "failure"))) as $hd
                  | ($hd | map(select(.conclusion == "success")) | length) as $succ
                  | ($hd | map(select(.conclusion == "failure")) | length) as $fail
                  | ($hd | length) as $tot
                  | (now_epoch - 86400)  as $t24
                  | (now_epoch - 604800) as $t7d
                  | (now_epoch - 2592000) as $t30d
                  | ($hd | map(select((.ts | parse_ts(.)) >= $t24)))  as $w24
                  | ($hd | map(select((.ts | parse_ts(.)) >= $t7d)))  as $w7d
                  | ($hd | map(select((.ts | parse_ts(.)) >= $t30d))) as $w30d
                  # Current streak: trailing run of identical conclusions.
                  | (reduce ($hd | reverse[]) as $e ({c: $latest.conclusion, n: 0, done: false};
                      if .done then . elif $e.conclusion == .c then .n += 1 else .done = true end))
                    as $streak
                  # MTTR over 7d: avg gap between a failure and the next success.
                  | (reduce range(0; ($w7d|length)) as $i (
                      {acc: 0, count: 0, last_fail: null};
                      ($w7d[$i]) as $e
                      | if $e.conclusion == "failure" and (.last_fail == null) then .last_fail = ($e.ts | parse_ts(.))
                        elif $e.conclusion == "success" and (.last_fail != null) then
                          .acc += (($e.ts | parse_ts(.)) - .last_fail) | .count += 1 | .last_fail = null
                        else . end))
                    as $mttr
                  | {
                      workflow: $latest.workflow,
                      label: $label,
                      latest: $latest,
                      prev: $prev,
                      flipped: ($prev != null and $prev.conclusion != $latest.conclusion),
                      total_seen: $tot,
                      success: $succ,
                      failure: $fail,
                      uptime_24h: uptime($w24),
                      uptime_7d:  uptime($w7d),
                      uptime_30d: uptime($w30d),
                      streak_count: $streak.n,
                      streak_state: $latest.conclusion,
                      flakes_7d: flakes($w7d),
                      mttr_7d_seconds: (if $mttr.count > 0 then ($mttr.acc / $mttr.count | floor) else null end)
                    }
                )) as $suites

              | {
                  generated_at: $now,
                  suites: $suites,
                  highlights: {
                    new_failures: ([$suites[] | select(.flipped and .latest.conclusion=="failure")
                                   | {workflow:.workflow,label:.label,url:.latest.url}]),
                    recoveries:   ([$suites[] | select(.flipped and .latest.conclusion=="success")
                                   | {workflow:.workflow,label:.label,url:.latest.url}]),
                    long_red:     ([$suites[] | select(.streak_state=="failure" and .streak_count>=3)
                                   | {workflow:.workflow,label:.label,hours:.streak_count,url:.latest.url}]
                                   | sort_by(-.hours)),
                    flakiest:     ([$suites[] | select(.flakes_7d>0)
                                   | {workflow:.workflow,label:.label,flakes:.flakes_7d}]
                                   | sort_by(-.flakes) | .[0:5]),
                    low_uptime:   ([$suites[] | select(.uptime_24h != null and .uptime_24h < 95)
                                   | {workflow:.workflow,label:.label,uptime_24h:.uptime_24h}]
                                   | sort_by(.uptime_24h) | .[0:5])
                  }
                }
            ' "${hourly[@]}" > ../metrics.json
          fi

          cp ../metrics.json status/metrics.json

          # Render highlights as markdown for issue/summary inclusion.
          jq -r '
            def fmt_pct(p): if p == null then "n/a" else "\(p)%" end;
            def fmt_dur(s): if s == null then "n/a"
              else (s/60|floor) as $m
                | if $m < 60 then "\($m)m"
                  elif $m < 1440 then "\($m/60|floor)h"
                  else "\($m/1440|floor)d" end end;
            "# Highlights — \(.generated_at)",
            "",
            (if (.highlights.new_failures|length) > 0 then
              "## 🆕 New failures this hour",
              "",
              (.highlights.new_failures[] | "- ❌ **\(.label)** — [run](\(.url))"),
              ""
             else empty end),
            (if (.highlights.recoveries|length) > 0 then
              "## ✅ Recoveries this hour",
              "",
              (.highlights.recoveries[] | "- 🟢 **\(.label)** — [run](\(.url))"),
              ""
             else empty end),
            (if (.highlights.long_red|length) > 0 then
              "## 🔥 Currently failing for ≥ 3 hours",
              "",
              (.highlights.long_red[] | "- **\(.label)** — \(.hours)h — [run](\(.url))"),
              ""
             else empty end),
            (if (.highlights.flakiest|length) > 0 then
              "## 🦋 Flakiest (last 7d)",
              "",
              (.highlights.flakiest[] | "- **\(.label)** — \(.flakes) transitions"),
              ""
             else empty end),
            (if (.highlights.low_uptime|length) > 0 then
              "## 📉 Lowest uptime (last 24h)",
              "",
              (.highlights.low_uptime[] | "- **\(.label)** — \(fmt_pct(.uptime_24h))"),
              ""
             else empty end),
            "## Per-suite snapshot",
            "",
            "| Suite | Latest | Streak | Uptime 24h | Uptime 7d | Flakes 7d | MTTR 7d |",
            "|---|---|---|---|---|---|---|",
            (.suites[] |
              ((.latest.conclusion // "—") as $c |
               (if $c == "success" then "✅"
                elif $c == "failure" then "❌"
                elif $c == "cancelled" then "🟡"
                else "⚪" end) as $icon |
               "| \(.label) | \($icon) \($c) | \(.streak_count) \(.streak_state) | \(fmt_pct(.uptime_24h)) | \(fmt_pct(.uptime_7d)) | \(.flakes_7d) | \(fmt_dur(.mttr_7d_seconds)) |"
              ))
          ' ../metrics.json > status/highlights.md

          cp status/highlights.md "$GITHUB_STEP_SUMMARY"
          cp ../metrics.json ../dashboard-data.json

          # Counters for outputs.
          {
            echo "new_failures=$(jq '.highlights.new_failures|length' ../metrics.json)"
            echo "recoveries=$(jq '.highlights.recoveries|length' ../metrics.json)"
            echo "long_red=$(jq '.highlights.long_red|length' ../metrics.json)"
          } >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # 2c. Render a self-contained dashboard.html (no runtime deps).
      # ------------------------------------------------------------------
      - name: Render dashboard
        env:
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
        run: |
          set -euo pipefail
          mkdir -p site
          # Inline metrics.json into the page so the dashboard works offline,
          # has no CORS surprises, and is byte-stable per snapshot.
          DATA="$(cat metrics.json)"
          cat > site/index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <title>actions-testcases — live status</title>
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <style>
            :root { color-scheme: light dark;
              --ok:#1a7f37; --bad:#cf222e; --warn:#bf8700; --mute:#57606a;
              --bg:#fff; --fg:#1f2328; --card:#f6f8fa; --border:#d0d7de; }
            @media (prefers-color-scheme: dark) {
              :root { --bg:#0d1117; --fg:#e6edf3; --card:#161b22; --border:#30363d;
                      --ok:#3fb950; --bad:#f85149; --warn:#d29922; --mute:#8b949e; }
            }
            * { box-sizing: border-box; }
            body { font: 14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
              margin: 0; padding: 24px; background: var(--bg); color: var(--fg); }
            h1 { margin: 0 0 4px; font-size: 24px; }
            .meta { color: var(--mute); margin-bottom: 24px; }
            .hl { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
              gap: 12px; margin-bottom: 24px; }
            .card { background: var(--card); border: 1px solid var(--border);
              border-radius: 8px; padding: 12px 14px; }
            .card h3 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase;
              letter-spacing: 0.04em; color: var(--mute); }
            .card ul { margin: 0; padding-left: 18px; }
            .card li { margin: 2px 0; }
            .card.empty { color: var(--mute); }
            table { width: 100%; border-collapse: collapse; background: var(--card);
              border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
            th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
            th { font-weight: 600; background: var(--bg); cursor: pointer; user-select: none; }
            th.sorted::after { content: " ↑"; color: var(--mute); }
            th.sorted.desc::after { content: " ↓"; }
            tr:last-child td { border-bottom: 0; }
            .ok { color: var(--ok); font-weight: 600; }
            .bad { color: var(--bad); font-weight: 600; }
            .warn { color: var(--warn); }
            .mute { color: var(--mute); }
            a { color: inherit; }
            .footer { margin-top: 24px; color: var(--mute); font-size: 12px; }
            .pill { display: inline-block; padding: 2px 8px; border-radius: 999px;
              background: var(--card); border: 1px solid var(--border); font-size: 12px; }
          </style>
          </head>
          <body>
          <h1>actions-testcases — live status</h1>
          <div class="meta">
            Snapshot <span id="ts"></span> ·
            <a href="${SERVER}/${REPO}">${REPO}</a> ·
            <a href="${SERVER}/${REPO}/tree/status">status branch</a> ·
            <a href="${SERVER}/${REPO}/actions">actions</a>
          </div>
          <div class="hl" id="highlights"></div>
          <table id="suites">
            <thead><tr>
              <th data-sort="label">Suite</th>
              <th data-sort="latest">Latest</th>
              <th data-sort="streak">Streak</th>
              <th data-sort="uptime_24h">Uptime 24h</th>
              <th data-sort="uptime_7d">Uptime 7d</th>
              <th data-sort="flakes_7d">Flakes 7d</th>
              <th data-sort="mttr_7d_seconds">MTTR 7d</th>
            </tr></thead>
            <tbody></tbody>
          </table>
          <div class="footer">
            Auto-rendered every hour by
            <a href="${SERVER}/${REPO}/blob/main/.github/workflows/_aggregate.yml">_aggregate.yml</a>.
            Data: <a href="metrics.json">metrics.json</a>.
            No external dependencies; no JavaScript leaves your browser.
          </div>
          <script>
          const DATA = ${DATA};
          const fmtPct = p => p == null ? '<span class="mute">n/a</span>' :
            \`<span class="\${p >= 99 ? 'ok' : p >= 95 ? '' : p >= 80 ? 'warn' : 'bad'}">\${p}%</span>\`;
          const fmtDur = s => {
            if (s == null) return '<span class="mute">n/a</span>';
            const m = Math.floor(s/60);
            return m < 60 ? \`\${m}m\` : m < 1440 ? \`\${Math.floor(m/60)}h\` : \`\${Math.floor(m/1440)}d\`;
          };
          const icon = c => c === 'success' ? '<span class="ok">✓ success</span>' :
            c === 'failure' ? '<span class="bad">✗ failure</span>' :
            c === 'cancelled' ? '<span class="warn">○ cancelled</span>' :
            '<span class="mute">– none</span>';
          document.getElementById('ts').textContent = DATA.generated_at;

          const hl = document.getElementById('highlights');
          const card = (title, items, render, emptyMsg) => {
            const div = document.createElement('div');
            div.className = 'card' + (items.length === 0 ? ' empty' : '');
            div.innerHTML = \`<h3>\${title}</h3>\` +
              (items.length === 0 ? \`<div>\${emptyMsg}</div>\` :
                '<ul>' + items.map(render).join('') + '</ul>');
            hl.appendChild(div);
          };
          const H = DATA.highlights;
          card('🆕 New failures', H.new_failures,
            x => \`<li>❌ <a href="\${x.url}">\${x.label}</a></li>\`, 'None this hour');
          card('✅ Recoveries', H.recoveries,
            x => \`<li>🟢 <a href="\${x.url}">\${x.label}</a></li>\`, 'None this hour');
          card('🔥 Long red streaks (≥3h)', H.long_red,
            x => \`<li><a href="\${x.url}">\${x.label}</a> — \${x.hours}h</li>\`, 'All clear');
          card('🦋 Flakiest (7d)', H.flakiest,
            x => \`<li>\${x.label} — \${x.flakes} transitions</li>\`, 'No flakes detected');
          card('📉 Low uptime (24h, <95%)', H.low_uptime,
            x => \`<li>\${x.label} — \${x.uptime_24h}%</li>\`, 'All ≥ 95%');

          const tbody = document.querySelector('#suites tbody');
          const renderRows = (suites) => {
            tbody.innerHTML = suites.map(s => \`
              <tr>
                <td><a href="\${s.latest.url || '#'}">\${s.label}</a></td>
                <td>\${icon(s.latest.conclusion)}</td>
                <td>\${s.streak_count} <span class="mute">\${s.streak_state}</span></td>
                <td>\${fmtPct(s.uptime_24h)}</td>
                <td>\${fmtPct(s.uptime_7d)}</td>
                <td>\${s.flakes_7d}</td>
                <td>\${fmtDur(s.mttr_7d_seconds)}</td>
              </tr>\`).join('');
          };
          let sortKey = 'label', sortDesc = false;
          const cmp = (a,b) => {
            const av = sortKey === 'label' ? a.label
              : sortKey === 'latest' ? (a.latest.conclusion || '')
              : sortKey === 'streak' ? a.streak_count
              : a[sortKey];
            const bv = sortKey === 'label' ? b.label
              : sortKey === 'latest' ? (b.latest.conclusion || '')
              : sortKey === 'streak' ? b.streak_count
              : b[sortKey];
            if (av == null && bv == null) return 0;
            if (av == null) return 1;
            if (bv == null) return -1;
            return (av < bv ? -1 : av > bv ? 1 : 0) * (sortDesc ? -1 : 1);
          };
          const apply = () => {
            document.querySelectorAll('th').forEach(th => {
              th.classList.toggle('sorted', th.dataset.sort === sortKey);
              th.classList.toggle('desc', th.dataset.sort === sortKey && sortDesc);
            });
            renderRows([...DATA.suites].sort(cmp));
          };
          document.querySelectorAll('th').forEach(th => {
            th.addEventListener('click', () => {
              if (sortKey === th.dataset.sort) sortDesc = !sortDesc;
              else { sortKey = th.dataset.sort; sortDesc = false; }
              apply();
            });
          });
          apply();
          </script>
          </body>
          </html>
          HTML
          # Also publish raw data alongside.
          cp metrics.json site/metrics.json
          cp snapshot.json site/snapshot.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Update top-level status README + commit
        env:
          TS: ${{ steps.snap.outputs.ts }}
          Y: ${{ steps.snap.outputs.year }}
          M: ${{ steps.snap.outputs.month }}
          D: ${{ steps.snap.outputs.day }}
          H: ${{ steps.snap.outputs.hour }}
        run: |
          set -euo pipefail
          cd status-branch
          dest="status/${Y}/${M}/${D}"

          {
            echo "# actions-testcases — status history"
            echo ""
            echo "**Latest snapshot:** [\`${dest}/${H}.md\`](./${dest}/${H}.md) — ${TS}"
            echo ""
            echo "→ **[Live dashboard](https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/)** (rendered fresh every hour)"
            echo ""
            echo "→ [Latest highlights](./highlights.md) · [machine-readable metrics](./metrics.json)"
            echo ""
            cat highlights.md
            echo ""
            echo "## Recent months"
            echo ""
            for mfile in $(ls status/*/*.md 2>/dev/null | sort -r | head -24); do
              echo "- [\`$mfile\`](./${mfile})"
            done
          } > status/README.md

          git add status README.md 2>/dev/null || git add status
          if git diff --cached --quiet; then
            echo "No status changes to commit."
          else
            git commit -q -m "snapshot ${TS}" -m "aggregator run: ${GITHUB_RUN_ID}"
            git push -q origin "$STATUS_BRANCH"
          fi

      # ------------------------------------------------------------------
      # 3. Per-failing-suite issues. Open on first failure, comment on
      #    repeat failures, auto-close on recovery.
      # ------------------------------------------------------------------
      - name: Ensure failure label exists
        run: |
          set -euo pipefail
          gh label create suite-failure --color b60205 \
            --description "Auto-managed: an actions-testcases suite is failing" 2>/dev/null || true

      - name: Open / update issues for failing suites
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r wf label url; do
            [ -n "$wf" ] || continue
            title="actions-suite: failing — ${wf}"
            body=$(printf '## %s is failing\n\nLatest run: %s\n\nAggregator: %s/%s/actions/runs/%s\n\nThis issue is auto-managed. It will close itself when the suite goes back to green.\n' \
              "$label" "${url:-no-link}" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")
            num=$(gh issue list --label suite-failure --state open --search "in:title \"$title\"" \
              --json number,title --jq ".[] | select(.title==\"$title\") | .number" | head -n1)
            if [ -z "$num" ]; then
              gh issue create --title "$title" --body "$body" --label suite-failure >/dev/null
              echo "opened issue for $wf"
            else
              gh issue comment "$num" --body "Still failing as of $(date -u +%FT%TZ). Latest run: ${url:-no-link}"
              echo "commented on existing issue #$num for $wf"
            fi
          done < failing.tsv

      - name: Close issues for recovered suites
        run: |
          set -euo pipefail
          failing_set="$(awk -F'\t' '{print $1}' failing.tsv | sort -u)"
          gh issue list --label suite-failure --state open \
            --json number,title --jq '.[] | "\(.number)\t\(.title)"' \
          | while IFS=$'\t' read -r num title; do
              wf="${title##*— }"
              if ! grep -Fxq "$wf" <<<"$failing_set"; then
                gh issue comment "$num" --body "✅ Recovered as of $(date -u +%FT%TZ). Auto-closing." || true
                gh issue close "$num" --reason completed || true
              fi
            done

  # ------------------------------------------------------------------
  # 4. Deploy the rendered dashboard to GitHub Pages.
  #    Pages must be enabled at repo Settings → Pages → Source: Actions.
  # ------------------------------------------------------------------
  deploy_dashboard:
    needs: report
    if: ${{ always() && needs.report.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.dep.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: dep
        uses: actions/deploy-pages@v4
