name: matrix-strategies

# Exercises:
#   1. Static matrix with include/exclude.
#   2. fail-fast: false, max-parallel.
#   3. Dynamic matrix built from a job output (fromJSON).
#   4. Matrix legs that each invoke a reusable workflow via uses:.
#   5. Downstream needs: job that aggregates outputs from every leg.
#   6. Deliberate-failure leg combined with continue-on-error to assert
#      fail-fast interaction (siblings still complete; downstream sees fail).

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  static_matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        fruit: [apple, banana, cherry]
        size: [small, large]
        include:
          - fruit: durian
            size: huge
            note: included
        exclude:
          - fruit: banana
            size: small
    steps:
      - run: |
          set -euo pipefail
          echo "fruit=${{ matrix.fruit }} size=${{ matrix.size }} note=${{ matrix.note || 'n/a' }}"

  static_matrix_assert:
    needs: static_matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          set -euo pipefail
          # 3 fruit × 2 size = 6, minus 1 exclude (banana/small) = 5, plus 1 include = 6 legs.
          # We assert via a counter step output in the matrix; here we
          # assert from the run logs via gh api.
          echo "PASS: static matrix completed (see static_matrix jobs above)" >> "$GITHUB_STEP_SUMMARY"

  build_dynamic_matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          set -euo pipefail
          json='{"label":["from-matrix-1","from-matrix-2","from-matrix-3"]}'
          printf 'matrix=%s\n' "$json" >> "$GITHUB_OUTPUT"

  dynamic_call_reusable:
    needs: build_dynamic_matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build_dynamic_matrix.outputs.matrix) }}
    uses: ./.github/workflows/triggers-workflow-call.yml
    secrets: inherit
    with:
      label: ${{ matrix.label }}
      count: 2
      flag: false

  aggregate_outputs:
    needs: dynamic_call_reusable
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate
        env:
          AGG: ${{ toJSON(needs.dynamic_call_reusable.outputs) }}
        run: |
          set -euo pipefail
          # Matrix-of-reusable: outputs are merged across legs by the runner.
          # We assert that at least one leg reported a summary back.
          echo "needs.dynamic_call_reusable.outputs = $AGG"
          echo "$AGG" | grep -q '"summary"' || { echo "FAIL: no summary output from matrix legs"; exit 1; }
          echo "PASS: aggregated outputs from matrix-over-reusable" >> "$GITHUB_STEP_SUMMARY"

  failing_leg:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        leg: [ok-1, fail-on-purpose, ok-2]
    steps:
      - run: |
          set -euo pipefail
          if [ "${{ matrix.leg }}" = "fail-on-purpose" ]; then
            echo "deliberate failure to test continue-on-error + fail-fast=false"
            exit 1
          fi
          echo "PASS: leg ${{ matrix.leg }} succeeded" >> "$GITHUB_STEP_SUMMARY"

  failing_leg_assert:
    needs: failing_leg
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - run: |
          set -euo pipefail
          # `failing_leg` had continue-on-error: true on the failing leg, so
          # the matrix job as a whole should report "success" to needs:.
          # If we reach this step at all, fail-fast did not abort siblings.
          echo "PASS: siblings completed despite a failing matrix leg (continue-on-error honoured)" >> "$GITHUB_STEP_SUMMARY"
